services:
  redis:
    image: redis:7-alpine
    container_name: skill-hub-redis
    restart: unless-stopped
    expose:
      - "6379"

  backend:
    build: ./backend
    container_name: skill-hub-backend
    env_file: ./backend/.env
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
      - avatars:/app/avatars
      - thumbnails:/app/thumbnails
    environment:
      - DB_PATH=/app/data/skill_hub.db
      - UPLOAD_DIR=/app/uploads
      - THUMBNAIL_DIR=/app/thumbnails
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: skill-hub-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  uploads:
  avatars:
  thumbnails:
