services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillhub}
      POSTGRES_DB: ${POSTGRES_DB:-skillhub_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skillhub} -d ${POSTGRES_DB:-skillhub_local}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  migrate:
    image: migrate/migrate:v4.19.0
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - postgres://${POSTGRES_USER:-skillhub}:${POSTGRES_PASSWORD:-skillhub}@postgres:5432/${POSTGRES_DB:-skillhub_local}?sslmode=disable
      - up

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: "${APP_ENV:-local}"
      PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-skillhub}:${POSTGRES_PASSWORD:-skillhub}@postgres:5432/${POSTGRES_DB:-skillhub_local}?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-local-dev-secret}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      UPLOAD_DIR: "${UPLOAD_DIR:-./uploads}"
      THUMBNAIL_DIR: "${THUMBNAIL_DIR:-./thumbnails}"
      REDIS_ADDR: "${REDIS_ADDR:-redis:6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      AI_SKILLS_CACHE_KEY: "${AI_SKILLS_CACHE_KEY:-ai:skills_context:v1}"
      AI_SKILLS_INVALIDATE_CHANNEL: "${AI_SKILLS_INVALIDATE_CHANNEL:-ai:skills_context:invalidate}"
      GITHUB_SYNC_ENABLED: "${GITHUB_SYNC_ENABLED:-false}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_OWNER: "${GITHUB_OWNER:-}"
      GITHUB_REPO: "${GITHUB_REPO:-}"
      GITHUB_BRANCH: "${GITHUB_BRANCH:-main}"
      GITHUB_BASE_DIR: "${GITHUB_BASE_DIR:-skills}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
      - backend_thumbnails:/app/thumbnails
      - backend_avatars:/app/avatars
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_ENV: "${VITE_APP_ENV:-local}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_thumbnails:
  backend_avatars:
